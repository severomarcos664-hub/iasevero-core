name: IASevero Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar sintaxe Python
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/services/openai_service.py
          python -m py_compile app/routes/telegram.py

      - name: Verificar imports e estrutura
        run: |
          test -f app/main.py
          test -f verify_deploy.sh
          python - <<PY
          import importlib
          modules = ["fastapi", "openai"]
          for m in modules:
              importlib.import_module(m)
              print(f"OK: {m}")
          print("Imports OK")
          PY

      - name: Rodar verificador local da IASevero
        run: |
          chmod +x verify_deploy.sh
          ./verify_deploy.sh
